<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>NextGen Founders</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">NextGen Founders</div>

    <div class="nav-buttons">
      <button class="nav-login">Login</button>
      <button class="nav-join">Join</button>
    </div>
  </nav>

  <section class="hero">

    <div class="hero-text">

      <p class="small-tag">
        THE NEXT GENERATION OF FOUNDERS
      </p>

      <h1>
        Build ideas that actually matter.
      </h1>

      <p class="subtitle">
        Learn, create and grow with ambitious young founders around the world.
      </p>

      <div class="hero-buttons">
        <button class="primary-btn">
          Join Community
        </button>

        <button class="secondary-btn">
          Explore
        </button>
      </div>

    </div>

    <div class="hero-card">

      <h3>Inside the community ✨</h3>

      <div class="mini-card pink">
        Startup Challenges
      </div>

      <div class="mini-card yellow">
        Mentorship Sessions
      </div>

      <div class="mini-card purple">
        Founder Community
      </div>

      <div class="mini-card cream">
        Creative Learning
      </div>

    </div>

  </section>

  <section class="auth-section">

    <div class="auth-box">

      <h2>Create Account</h2>

      <input id="name" placeholder="Name">
      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
      <input id="age" placeholder="Age">
      <input id="country" placeholder="Country">

      <button onclick="register()" class="auth-btn">
        Create account
      </button>

    </div>

    <div class="auth-box">

      <h2>Welcome Back</h2>

      <input id="loginEmail" placeholder="Email">
      <input id="loginPassword" type="password" placeholder="Password">

      <button onclick="login()" class="auth-btn">
        Login
      </button>

    </div>

  </section>

  <p id="result"></p>

<script>

const API = "https://nextgenfounders-backend-production.up.railway.app";

async function register() {

  const res = await fetch(API + "/register", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({
      name: name.value,
      email: email.value,
      password: password.value,
      age: age.value,
      country: country.value
    })
  });

  const data = await res.text();

  result.innerText = data;
}

async function login() {

  const res = await fetch(API + "/login", {
    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({
      email: loginEmail.value,
      password: loginPassword.value
    })
  });

  const data = await res.json();

  localStorage.setItem("token", data.token);

  result.innerText = "Logged in successfully ✨";
}

</script>

</body>
</html>
